<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Audio Transcribator{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/ui/upload">Audio Transcribator</a>
      <form method="post" action="/ui/logout">
        <button class="ghost-button" type="submit">Logout</button>
      </form>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
